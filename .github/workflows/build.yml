name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages & accept licenses
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Locate APK and write to summary
        if: success() && github.ref == 'refs/heads/main'
        run: |
          APK=$(find app/build -name "*.apk" | head -1)
          echo "APK_PATH=$APK"
          echo "APK path: $APK" >> "$GITHUB_STEP_SUMMARY"
          echo "$APK" > apk_path.txt
          ls -la "$APK"

      - name: Upload APK to Release
        if: success() && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(cat apk_path.txt)
          NAME=$(basename "$APK")
          # ensure release exists
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d '{"tag_name":"latest","name":"Latest Build","prerelease":true}' \
            "https://api.github.com/repos/${{ github.repository }}/releases" >/dev/null || true
          REL_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
          echo "Release id: $REL_ID"
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$REL_ID/assets?name=$NAME"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            app/build/reports/
            app/build/outputs/
